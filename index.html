<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Husjakten</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100vh}
.app{max-width:900px;margin:0 auto;padding:1.25rem 1rem 4rem}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.1rem}
.logo{font-size:22px;font-weight:700;color:#1a1a1a}.logo span{color:#1D9E75}
.sync-status{font-size:12px;color:#888;display:flex;align-items:center;gap:5px}
.dot{width:7px;height:7px;border-radius:50%;background:#1D9E75;flex-shrink:0}
.dot.syncing{background:#f59e0b}.dot.error{background:#e24b4a}

/* TABS */
.tabs{display:flex;gap:0;margin-bottom:1.25rem;border-bottom:1.5px solid #e5e5e3}
.tab{font-size:14px;font-weight:500;padding:.6rem 1.2rem;cursor:pointer;color:#888;border-bottom:2px solid transparent;margin-bottom:-1.5px;transition:all .15s}
.tab.active{color:#1a1a1a;border-bottom-color:#1D9E75}
.tab-content{display:none}.tab-content.active{display:block}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.1rem}
.stat{background:#fff;border-radius:10px;padding:.7rem 1rem;border:0.5px solid #e5e5e3}
.stat-label{font-size:11px;color:#888;margin-bottom:3px}
.stat-val{font-size:20px;font-weight:700;color:#1a1a1a}

/* FILTERS */
.filter-row{display:flex;gap:7px;margin-bottom:1.1rem;flex-wrap:wrap;align-items:center}
.filter-btn{font-size:12px;padding:5px 12px;border:0.5px solid #ddd;border-radius:8px;background:#fff;color:#666;cursor:pointer}
.filter-btn.active{background:#f0f0ee;color:#1a1a1a;border-color:#aaa}
.sort-select{font-size:12px;padding:5px 10px;border:0.5px solid #ddd;border-radius:8px;background:#fff;color:#1a1a1a;margin-left:auto;cursor:pointer}

/* CARDS */
.cards{display:flex;flex-direction:column;gap:.85rem}
.card{background:#fff;border:0.5px solid #e5e5e3;border-radius:12px;overflow:hidden;transition:all .2s;position:relative}
.card:hover{box-shadow:0 2px 12px rgba(0,0,0,.06)}
.card.approved{border-left:3px solid #1D9E75}
.card.utleid-card{opacity:.55;border-left:3px solid #e24b4a;filter:grayscale(0.4)}
.card-top{display:grid;grid-template-columns:160px 1fr}
.card-img{width:160px;height:130px;object-fit:cover;display:block}
.card-img-placeholder{width:160px;height:130px;background:#f0f0ee;display:flex;align-items:center;justify-content:center;color:#bbb;font-size:28px}
.card-main{padding:.8rem 1rem}
.card-title-row{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:.4rem}
.card-address{font-size:14px;font-weight:600;color:#1a1a1a;line-height:1.3}
.card-link{font-size:11px;color:#888;text-decoration:none;white-space:nowrap;flex-shrink:0}
.card-link:hover{color:#1a1a1a}
.tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:.45rem}
.tag{font-size:10px;padding:2px 7px;border-radius:6px;border:0.5px solid #e5e5e3;color:#666;background:#f5f5f3}
.tag.yes{color:#0F6E56;background:#E1F5EE;border-color:#9FE1CB}
.tag.no{color:#993C1D;background:#FAECE7;border-color:#F5C4B3}
.tag.info{color:#185FA5;background:#E6F1FB;border-color:#B5D4F4}
.metrics{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin-bottom:.4rem}
.metric{text-align:center}
.metric-val{font-size:13px;font-weight:600;color:#1a1a1a}
.metric-label{font-size:10px;color:#888}
.price-row{display:flex;align-items:baseline;gap:6px}
.price{font-size:16px;font-weight:700;color:#1a1a1a}
.price-sub{font-size:11px;color:#888}
.card-bottom{border-top:0.5px solid #f0f0ee;padding:.6rem 1rem;display:flex;gap:.6rem;align-items:center;flex-wrap:wrap;background:#fafaf8}
.status-checks{display:flex;gap:7px;flex-wrap:wrap;flex:1}
.chk{display:flex;align-items:center;gap:4px;font-size:11px;color:#888;cursor:pointer;user-select:none}
.chk input{cursor:pointer;width:13px;height:13px;accent-color:#1D9E75}
.chk.done{color:#1a1a1a;font-weight:500}
.votes{display:flex;gap:5px;align-items:center}
.voter{display:flex;flex-direction:column;align-items:center;gap:2px}
.voter-name{font-size:10px;color:#888}
.vote-btns{display:flex;gap:2px}
.vote-btn{width:26px;height:26px;border-radius:6px;border:0.5px solid #e5e5e3;background:#f5f5f3;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:#888}
.vote-btn.up.active{background:#E1F5EE;border-color:#9FE1CB;color:#0F6E56}
.vote-btn.down.active{background:#FAECE7;border-color:#F5C4B3;color:#993C1D}
.score-badge{font-size:12px;font-weight:700;min-width:20px;text-align:center}

/* UTLEID TOGGLE BTN */
.utleid-toggle{position:absolute;top:8px;left:8px;font-size:10px;font-weight:600;padding:3px 9px;border-radius:6px;border:none;cursor:pointer;z-index:10;transition:all .15s}
.utleid-toggle.off{background:rgba(255,255,255,0.9);color:#888;border:0.5px solid #ddd}
.utleid-toggle.off:hover{background:#FAECE7;color:#993C1D;border-color:#F5C4B3}
.utleid-toggle.on{background:#e24b4a;color:#fff}

/* VISNINGSPLAN TAB */
.visning-layout{display:grid;grid-template-columns:1fr 340px;gap:1rem;align-items:start}
.visning-list{display:flex;flex-direction:column;gap:.75rem}
.visning-header-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:.85rem}
.visning-title{font-size:16px;font-weight:700}
.day-group{background:#fff;border:0.5px solid #e5e5e3;border-radius:10px;overflow:hidden}
.day-label{font-size:12px;font-weight:700;color:#888;padding:.5rem .9rem;background:#f5f5f3;border-bottom:0.5px solid #e5e5e3;text-transform:uppercase;letter-spacing:.05em}
.day-label.today{color:#1D9E75}
.visning-item{padding:.75rem .9rem;border-bottom:0.5px solid #f0f0ee;cursor:pointer;transition:background .1s}
.visning-item:last-child{border-bottom:none}
.visning-item:hover{background:#fafaf8}
.visning-item.highlighted{background:#E1F5EE}
.vi-address{font-size:13px;font-weight:600;color:#1a1a1a;margin-bottom:.35rem}
.vi-dates{display:flex;flex-direction:column;gap:4px;margin-bottom:.35rem}
.vi-date-row{display:flex;align-items:center;gap:6px}
.vi-date-label{font-size:10px;font-weight:600;padding:1px 6px;border-radius:4px;white-space:nowrap}
.vi-date-label.proposed{background:#E6F1FB;color:#185FA5}
.vi-date-label.requested{background:#FAEEDA;color:#854F0B}
.vi-date-label.confirmed{background:#E1F5EE;color:#0F6E56}
.vi-date-val{font-size:12px;color:#1a1a1a}
.vi-note{font-size:11px;color:#888;font-style:italic}
.vi-actions{display:flex;gap:5px;margin-top:.4rem;flex-wrap:wrap}
.vi-btn{font-size:11px;padding:3px 8px;border:0.5px solid #ddd;border-radius:6px;background:#fff;color:#666;cursor:pointer}
.vi-btn:hover{background:#f0f0ee;color:#1a1a1a}
.vi-btn.confirm{border-color:#9FE1CB;color:#0F6E56;background:#E1F5EE}

/* INLINE EDIT */
.vi-input{font-size:12px;padding:3px 7px;border:0.5px solid #ddd;border-radius:6px;background:#fff;color:#1a1a1a;width:100%}
.vi-input:focus{outline:none;border-color:#1D9E75}
.edit-row{display:flex;gap:5px;align-items:center;margin-top:4px}
.edit-row .vi-input{flex:1}
.save-btn{font-size:11px;padding:3px 8px;border:none;border-radius:6px;background:#1D9E75;color:#fff;cursor:pointer}

/* UNPLANNED */
.unplanned-section{margin-top:1rem}
.unplanned-title{font-size:12px;font-weight:600;color:#aaa;margin-bottom:.5rem;text-transform:uppercase;letter-spacing:.05em}
.unplanned-item{background:#fff;border:0.5px solid #e5e5e3;border-radius:8px;padding:.6rem .9rem;margin-bottom:.4rem;display:flex;align-items:center;justify-content:space-between}
.unplanned-addr{font-size:12px;font-weight:500;color:#1a1a1a}
.add-date-btn{font-size:11px;padding:3px 8px;border:0.5px solid #ddd;border-radius:6px;background:#fff;color:#1D9E75;cursor:pointer;border-color:#9FE1CB}

/* MAP */
.map-sticky{position:sticky;top:1rem}
.map-container{border-radius:10px;overflow:hidden;border:0.5px solid #e5e5e3;height:420px}
.map-legend{background:#fff;border:0.5px solid #e5e5e3;border-radius:8px;padding:.6rem .8rem;margin-top:.6rem;font-size:11px;color:#888}
.map-legend-title{font-size:11px;font-weight:600;color:#1a1a1a;margin-bottom:.3rem}
.legend-row{display:flex;align-items:center;gap:6px;margin-bottom:2px}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

.empty-visning{text-align:center;padding:2.5rem;color:#aaa;font-size:13px;background:#fff;border-radius:10px;border:0.5px solid #e5e5e3}

@media(max-width:680px){
  .visning-layout{grid-template-columns:1fr}
  .map-sticky{position:static}
  .map-container{height:260px}
  .card-top{grid-template-columns:110px 1fr}
  .card-img,.card-img-placeholder{width:110px;height:100px}
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .metrics{grid-template-columns:repeat(3,1fr)}
}
</style>
</head>

          <div class="legend-row"><div class="legend-dot" style="background:#f59e0b"></div> Ingen dato ennå</div>
        </div>
      </div>
    </div>
  </div>
</div>

let listings = [];
let sortKey = 'id';
let currentFilter = 'all';
let visningSort = 'date';
let map = null;
let mapMarkers = {};
let highlightedItem = null;
let editingItem = null;

function setStatus(msg, state='ok'){
  document.getElementById('sync-label').textContent = msg;
  const dot = document.getElementById('dot');
  dot.className = 'dot'+(state==='syncing'?' syncing':state==='error'?' error':'');
}

async function apiFetch(path, opts={}){
  const res = await fetch(SUPABASE_URL+'/rest/v1/'+path, {
    ...opts,
    headers:{
      'apikey':SUPABASE_KEY,
      'Authorization':'Bearer '+SUPABASE_KEY,
      'Content-Type':'application/json',
      'Prefer':opts.prefer||'',
      ...opts.headers
    }
  });
  if(!res.ok) throw new Error(await res.text());
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

async function loadData(){
  setStatus('Laster...','syncing');
  try {
    const rows = await apiFetch(TABLE+'?select=*');
    const dbMap = {};
    rows.forEach(r => dbMap[r.listing_id] = r);
    listings = SEED.map(s => {
      const db = dbMap[s.id];
      return {
        ...s,
        votes: db?.votes || {Henrik:0,Martin:0,Farid:0},
        status: db?.status || {contacted:false,visited:false,applied:false,approved:false},
        utleid: db ? (db.utleid === true) : false,
        viewing: db?.viewing || {proposed:'',requested:'',confirmed:'',note:''}
      };
    });
    const missing = SEED.filter(s => !dbMap[s.id]);
    for(const s of missing){
      await apiFetch(TABLE, {
        method:'POST', prefer:'return=minimal',
        body: JSON.stringify({
          listing_id:s.id,
          votes:{Henrik:0,Martin:0,Farid:0},
          status:{contacted:false,visited:false,applied:false,approved:false},
          utleid:s.utleid,
          viewing:{proposed:'',requested:'',confirmed:'',note:''}
        })
      });
    }
    setStatus('Synkronisert ✓','ok');
    render();
  } catch(e){
    setStatus('Feil – sjekk nett','error');
    console.error(e);
  }
}

async function saveRow(id){
  const l = listings.find(x=>x.id===id);
  if(!l) return;
  setStatus('Lagrer...','syncing');
  try {
    await apiFetch(TABLE+'?listing_id=eq.'+id, {
      method:'PATCH', prefer:'return=minimal',
      body: JSON.stringify({votes:l.votes, status:l.status, utleid:l.utleid===true, viewing:l.viewing})
    });
    setStatus('Synkronisert ✓','ok');
  } catch(e){
    setStatus('Feil ved lagring','error');
  }
}

function voteScore(v){ return Object.values(v).reduce((a,b)=>a+b,0); }
function setFilter(f,el){ currentFilter=f; document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active')); el.classList.add('active'); render(); }
function setSort(v){ sortKey=v; render(); }
function setVisningSort(v){ visningSort=v; renderVisning(); }
function switchTab(tab, el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-'+tab).classList.add('active');
  if(tab==='visning') setTimeout(()=>{ initMap(); renderVisning(); },100);
}

function getFiltered(){
  let list = listings.filter(l=>{
    if(currentFilter==='all') return true;
    if(currentFilter==='new') return !l.status.contacted&&!l.status.visited&&!l.status.approved;
    if(currentFilter==='contacted') return l.status.contacted&&!l.status.visited;
    if(currentFilter==='visited') return l.status.visited&&!l.status.approved;
    if(currentFilter==='approved') return l.status.approved;
    return true;
  });
  if(sortKey==='rent') list=[...list].sort((a,b)=>a.rent-b.rent);
  else if(sortKey==='sqm') list=[...list].sort((a,b)=>b.sqm-a.sqm);
  else if(sortKey==='score') list=[...list].sort((a,b)=>voteScore(b.votes)-voteScore(a.votes));
  return list;
}

function renderStats(){
  const active = listings.filter(l=>!l.utleid);
  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="stat-label">Aktive</div><div class="stat-val">${active.length}</div></div>
    <div class="stat"><div class="stat-label">Kontaktet</div><div class="stat-val">${listings.filter(l=>l.status.contacted).length}</div></div>
    <div class="stat"><div class="stat-label">Visning</div><div class="stat-val">${listings.filter(l=>l.status.visited).length}</div></div>
    <div class="stat"><div class="stat-label">Godkjent</div><div class="stat-val">${listings.filter(l=>l.status.approved).length}</div></div>`;
}

function renderCards(){
  const allList = getFiltered();
  const list = allList.filter(l => !l.utleid);
  const utleidList = allList.filter(l => l.utleid);
  const utleidVisible = window._showUtleid || false;
  if(!list.length && !utleidList.length){ document.getElementById('cards').innerHTML='<div style="text-align:center;padding:2rem;color:#aaa">Ingen boliger</div>'; return; }
  const utleidSection = utleidList.length ? `
    <div style="margin-top:1rem">
      <button onclick="window._showUtleid=!window._showUtleid;renderCards()" style="font-size:12px;padding:5px 12px;border:0.5px solid #ddd;border-radius:8px;background:#fff;color:#888;cursor:pointer;width:100%;text-align:left">
        ${utleidVisible ? '▲' : '▼'} Vis utleide / ekskluderte (${utleidList.length})
      </button>
      ${utleidVisible ? utleidList.map(l=>cardHtml(l)).join('') : ''}
    </div>` : '';
  document.getElementById('cards').innerHTML = list.map(l=>cardHtml(l)).join('') + utleidSection;
}
function cardHtml(l){
    const pp = l.rent && l.bedrooms ? Math.round(l.rent/l.bedrooms).toLocaleString('nb-NO')+' kr' : '—';
    const score = voteScore(l.votes);
    const imgHtml = l.img ? `<img class="card-img" src="${l.img}" alt="" loading="lazy">` : `<div class="card-img-placeholder">🏠</div>`;
    const votersHtml = VOTERS.map(v=>`
      <div class="voter">
        <div class="voter-name">${v}</div>
        <div class="vote-btns">
          <button class="vote-btn up ${l.votes[v]===1?'active':''}" onclick="vote(${l.id},'${v}',1)">👍</button>
          <button class="vote-btn down ${l.votes[v]===-1?'active':''}" onclick="vote(${l.id},'${v}',-1)">👎</button>
        </div>
      </div>`).join('');
    const checksHtml = STATUSES.map(s=>`
      <label class="chk ${l.status[s.key]?'done':''}">
        <input type="checkbox" ${l.status[s.key]?'checked':''} onchange="toggleStatus(${l.id},'${s.key}',this.checked)">
        ${s.label}
      </label>`).join('');
    const gymTag = l.gym ? `<span class="tag info">🏋️ ${l.gym}</span>` : '';
    return `
    <div class="card ${l.status.approved?'approved':''} ${l.utleid?'utleid-card':''}" id="card-${l.id}">
      <button class="utleid-toggle ${l.utleid?'on':'off'}" onclick="toggleUtleid(${l.id})">${l.utleid?'✕ Utleid':'Utleid?'}</button>
      <div class="card-top">
        ${imgHtml}
        <div class="card-main">
          <div class="card-title-row">
            <div class="card-address">${l.address}</div>
            <a class="card-link" href="${l.link}" target="_blank">↗ Finn.no</a>
          </div>
          <div class="tags">
            <span class="tag">${l.type}</span>
            <span class="tag">🚗 ${l.travelCar}</span>
            <span class="tag">🚌 ${l.travelPublic}</span>
            <span class="tag ${l.elIncluded?'yes':'no'}">⚡ Strøm ${l.elIncluded?'inkl.':'eks.'}</span>
            <span class="tag ${l.netIncluded?'yes':'no'}">📶 Nett ${l.netIncluded?'inkl.':'eks.'}</span>
            <span class="tag">🅿️ ${l.parking}</span>
            ${gymTag}
          </div>
          <div class="metrics">
            <div class="metric"><div class="metric-val">${l.sqm}</div><div class="metric-label">kvm</div></div>
            <div class="metric"><div class="metric-val">${l.bedrooms}</div><div class="metric-label">soverom</div></div>
            <div class="metric"><div class="metric-val">${l.bathrooms}</div><div class="metric-label">bad</div></div>
            <div class="metric"><div class="metric-val">${score>0?'+'+score:score}</div><div class="metric-label">score</div></div>
            <div class="metric"><div class="metric-val" style="font-size:10px">${l.moveIn}</div><div class="metric-label">innflytting</div></div>
          </div>
          <div class="price-row">
            <span class="price">${l.rent?l.rent.toLocaleString('nb-NO')+' kr/mnd':'Pris mangler'}</span>
            <span class="price-sub">${l.rent && l.bedrooms?'· '+pp+'/rom':''}${l.deposit?' · Dep. '+l.deposit.toLocaleString('nb-NO')+' kr':''}</span>
          </div>
        </div>
      </div>
      <div class="card-bottom">
        <div class="status-checks">${checksHtml}</div>
        <div class="votes">${votersHtml}<div class="score-badge">${score>0?'+'+score:score}</div></div>
      </div>
    </div>`;
}

function render(){ renderStats(); renderCards(); }

async function vote(id,voter,val){
  const l=listings.find(x=>x.id===id); if(!l)return;
  l.votes[voter]=l.votes[voter]===val?0:val;
  render(); await saveRow(id);
}
async function toggleStatus(id,key,val){
  const l=listings.find(x=>x.id===id); if(!l)return;
  l.status[key]=val; render(); await saveRow(id);
}
async function toggleUtleid(id){
  const l=listings.find(x=>x.id===id); if(!l)return;
  l.utleid=!l.utleid; render(); await saveRow(id);
}

function initMap(){
  if(map) return;
  map = L.map('map').setView([59.930, 10.750], 11);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© OpenStreetMap',maxZoom:19
  }).addTo(map);
}

function getVisningListings(){
  return listings.filter(l => l.status.contacted && !l.utleid);
}

function hasDate(l){
  return l.viewing && (l.viewing.proposed || l.viewing.requested || l.viewing.confirmed);
}

function getConfirmedDate(l){
  return l.viewing?.confirmed || l.viewing?.proposed || l.viewing?.requested || '';
}

function formatDate(d){
  if(!d) return '';
  try {
    const dt = new Date(d);
    if(isNaN(dt)) return d;
    return dt.toLocaleDateString('nb-NO',{weekday:'long',day:'numeric',month:'long'});
  } catch(e){ return d; }
}

function renderVisning(){
  const vList = getVisningListings();
  updateMapMarkers(vList);

  if(!vList.length){
    document.getElementById('visning-list').innerHTML=`<div class="empty-visning">Ingen boliger kontaktet ennå.<br>Kryss av "Kontaktet" på boliger i Boliger-fanen.</div>`;
    return;
  }

  // Split into planned and unplanned
  const planned = vList.filter(l=>hasDate(l));
  const unplanned = vList.filter(l=>!hasDate(l));

  // Sort planned
  let sortedPlanned = [...planned];
  if(visningSort==='date'){
    sortedPlanned.sort((a,b)=>{
      const da = new Date(getConfirmedDate(a)||'9999');
      const db = new Date(getConfirmedDate(b)||'9999');
      return da-db;
    });
  } else {
    sortedPlanned.sort((a,b)=>a.address.localeCompare(b.address));
  }

  // Group by confirmed date
  const groups = {};
  sortedPlanned.forEach(l=>{
    const d = l.viewing?.confirmed || '';
    const key = d || '__proposed__';
    if(!groups[key]) groups[key]=[];
    groups[key].push(l);
  });

  let html = '';
  const today = new Date().toISOString().split('T')[0];

  Object.keys(groups).sort().forEach(dateKey=>{
    const isConfirmed = dateKey !== '__proposed__';
    const label = isConfirmed ? formatDate(dateKey) : 'Dato ikke bekreftet';
    const isToday = dateKey === today;
    html += `<div class="day-group">
      <div class="day-label ${isToday?'today':''}">${isToday?'🟢 I dag – ':''} ${label}</div>
      ${groups[dateKey].map(l=>visningItemHtml(l)).join('')}
    </div>`;
  });

  if(unplanned.length){
    html += `<div class="unplanned-section">
      <div class="unplanned-title">Ingen dato ennå (${unplanned.length})</div>
      ${unplanned.map(l=>`
        <div class="unplanned-item" style="flex-direction:column;align-items:flex-start;gap:.5rem" id="vi-${l.id}">
          <div style="display:flex;align-items:center;justify-content:space-between;width:100%">
            <div class="unplanned-addr">📍 ${l.address}</div>
            <button class="add-date-btn" onclick="startEdit(${l.id})">+ Legg til dato</button>
          </div>
          <div id="edit-${l.id}" style="width:100%;display:${editingItem===l.id?'block':'none'}">
            ${editingItem===l.id ? editFormHtml(l) : ''}
          </div>
        </div>
      `).join('')}
    </div>`;
  }

  document.getElementById('visning-list').innerHTML = html;
}

function visningItemHtml(l){
  const v = l.viewing || {};
  const isEditing = editingItem === l.id;
  return `
  <div class="visning-item ${highlightedItem===l.id?'highlighted':''}" id="vi-${l.id}" onclick="highlightListing(${l.id})">
    <div class="vi-address">📍 ${l.address}</div>
    <div class="vi-dates">
      ${v.confirmed ? `<div class="vi-date-row"><span class="vi-date-label confirmed">✅ Bekreftet</span><span class="vi-date-val">${formatDate(v.confirmed)}</span></div>` : ''}
      ${v.proposed ? `<div class="vi-date-row"><span class="vi-date-label proposed">De foreslo</span><span class="vi-date-val">${formatDate(v.proposed)}</span></div>` : ''}
      ${v.requested ? `<div class="vi-date-row"><span class="vi-date-label requested">Vi spurte</span><span class="vi-date-val">${formatDate(v.requested)}</span></div>` : ''}
    </div>
    ${v.note ? `<div class="vi-note">💬 ${v.note}</div>` : ''}
    <div class="vi-actions">
      <button class="vi-btn" onclick="startEdit(${l.id});event.stopPropagation()">✏️ Rediger</button>
      ${v.proposed && !v.confirmed ? `<button class="vi-btn confirm" onclick="confirmDate(${l.id});event.stopPropagation()">✅ Bekreft foreslått dato</button>` : ''}
    </div>
    <div id="edit-${l.id}" style="display:${isEditing?'block':'none'};margin-top:.5rem" onclick="event.stopPropagation()">
      ${editFormHtml(l)}
    </div>
  </div>`;
}

function editFormHtml(l){
  const v = l.viewing || {};
  return `
    <div style="display:flex;flex-direction:column;gap:6px;background:#f5f5f3;padding:.6rem;border-radius:8px">
      <div class="edit-row"><label style="font-size:10px;color:#888;width:90px;flex-shrink:0">De foreslo</label><input class="vi-input" type="date" id="ei-proposed-${l.id}" value="${v.proposed||''}"></div>
      <div class="edit-row"><label style="font-size:10px;color:#888;width:90px;flex-shrink:0">Vi spurte om</label><input class="vi-input" type="date" id="ei-requested-${l.id}" value="${v.requested||''}"></div>
      <div class="edit-row"><label style="font-size:10px;color:#888;width:90px;flex-shrink:0">Bekreftet dato</label><input class="vi-input" type="date" id="ei-confirmed-${l.id}" value="${v.confirmed||''}"></div>
      <div class="edit-row"><label style="font-size:10px;color:#888;width:90px;flex-shrink:0">Notat</label><input class="vi-input" type="text" id="ei-note-${l.id}" placeholder="f.eks. ring Thomas 12:00" value="${v.note||''}"></div>
      <div style="display:flex;gap:5px;justify-content:flex-end">
        <button class="vi-btn" onclick="cancelEdit()">Avbryt</button>
        <button class="save-btn" onclick="saveViewing(${l.id})">Lagre</button>
      </div>
    </div>`;
}

function startEdit(id){
  editingItem = id;
  renderVisning();
  setTimeout(()=>{ const el=document.getElementById('edit-'+id); if(el) el.scrollIntoView({behavior:'smooth',block:'nearest'}); },100);
}
function cancelEdit(){ editingItem=null; renderVisning(); }

async function saveViewing(id){
  const l = listings.find(x=>x.id===id); if(!l) return;
  l.viewing = {
    proposed: document.getElementById('ei-proposed-'+id)?.value||'',
    requested: document.getElementById('ei-requested-'+id)?.value||'',
    confirmed: document.getElementById('ei-confirmed-'+id)?.value||'',
    note: document.getElementById('ei-note-'+id)?.value||''
  };
  editingItem = null;
  await saveRow(id);
  renderVisning();
}

async function confirmDate(id){
  const l = listings.find(x=>x.id===id); if(!l) return;
  l.viewing.confirmed = l.viewing.proposed;
  await saveRow(id);
  renderVisning();
}

function highlightListing(id){
  highlightedItem = id;
  renderVisning();
  if(mapMarkers[id]){ mapMarkers[id].openPopup(); }
}

function updateMapMarkers(vList){
  if(!map) return;
  Object.values(mapMarkers).forEach(m=>map.removeLayer(m));
  mapMarkers = {};
  if(!vList.length) return;

  const bounds = [];
  vList.forEach(l=>{
    if(!l.lat||!l.lng) return;
    const v = l.viewing||{};
    const hasConfirmed = !!v.confirmed;
    const hasAnyDate = !!(v.proposed||v.requested||v.confirmed);
    const color = hasConfirmed ? '#1D9E75' : hasAnyDate ? '#185FA5' : '#f59e0b';
    const dateStr = hasConfirmed ? formatDate(v.confirmed) : hasAnyDate ? formatDate(v.proposed||v.requested) : 'Ingen dato';

    const icon = L.divIcon({
      className:'',
      html:`<div style="background:${color};width:14px;height:14px;border-radius:50%;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.3)"></div>`,
      iconSize:[14,14],iconAnchor:[7,7]
    });

    const marker = L.marker([l.lat,l.lng],{icon})
      .addTo(map)
      .bindPopup(`<b style="font-size:12px">${l.address}</b><br><span style="font-size:11px;color:#666">${dateStr}</span>`);

    marker.on('click',()=>highlightListing(l.id));
    mapMarkers[l.id]=marker;
    bounds.push([l.lat,l.lng]);
  });

  if(bounds.length) map.fitBounds(bounds,{padding:[30,30],maxZoom:13});
}

loadData();
setInterval(loadData, 30000);
</script>
</body>
</html>
