<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Malingsetiketter</title>
  <script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: ui-sans-serif, system-ui, Arial, sans-serif; background: #e9ecef; color: #111; padding: 24px; }
    .toolbar { max-width: 210mm; margin: 0 auto 16px; display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
    .toolbar h1 { font-size: 18px; font-weight: 800; }
    .toolbar p { font-size: 13px; color: #555; }
    .print-btn { background: #111; color: #fff; border: none; padding: 10px 18px; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; }
    .print-btn:hover { background: #333; }

    .sheet {
      width: 210mm; min-height: 297mm; margin: 0 auto; background: #fff;
      padding: 12mm 10mm; box-shadow: 0 2px 14px rgba(0,0,0,.18);
      display: grid; grid-template-columns: 1fr 1fr; gap: 6mm; align-content: start;
    }
    .label {
      border: 1.5px dashed #c0c0c0; border-radius: 6px; padding: 6mm 5mm;
      display: flex; gap: 5mm; align-items: center; min-height: 58mm;
    }
    .label canvas { width: 40mm; height: 40mm; flex-shrink: 0; }
    .meta { flex: 1; min-width: 0; }
    .ordre { font-size: 20px; font-weight: 800; letter-spacing: .5px; font-family: ui-monospace, monospace; }
    .row { margin-top: 7px; }
    .lbl { font-size: 10px; text-transform: uppercase; letter-spacing: .6px; color: #888; }
    .val { font-size: 15px; font-weight: 600; }
    .farge .val { font-family: ui-monospace, monospace; }
    .swatch { display: inline-block; width: 11px; height: 11px; border-radius: 2px; border: 1px solid #00000022; vertical-align: middle; margin-right: 5px; }

    @page { size: A4; margin: 0; }
    @media print {
      body { background: #fff; padding: 0; }
      .toolbar { display: none; }
      .sheet { box-shadow: none; margin: 0; }
      .label { border-color: #ddd; }
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <div>
      <h1>Malingsetiketter</h1>
      <p>Skann QR &rarr; ordrenr &middot; kunde &middot; postnr &middot; fargekode. Skriv ut, klipp ut, fest p&aring; spannet.</p>
    </div>
    <button class="print-btn" onclick="window.print()">Skriv ut</button>
  </div>

  <div class="sheet" id="sheet"></div>

  <script>
    const ORDERS = [
      { id: "1983-4501", kunde: "Byggmester Nilsen", postnr: "0150", farge: "33010", navn: "Hvit",  hex: "#f3f3ef" },
      { id: "1983-4502", kunde: "Hansen Bygg",       postnr: "1430", farge: "33020", navn: "R\u00f8d",   hex: "#9b2220" },
      { id: "1983-4498", kunde: "Oslo Eiendom",      postnr: "0277", farge: "33050", navn: "Bl\u00e5",   hex: "#2a6099" },
      { id: "1983-4497", kunde: "Vestby Sameie",     postnr: "1540", farge: "33900", navn: "Sort",  hex: "#1a1a1a" },
      { id: "1983-4490", kunde: "Lien & S\u00f8nn",       postnr: "3045", farge: "33060", navn: "Gr\u00f8nn", hex: "#3b6b3b" },
      { id: "1983-4491", kunde: "S\u00f8r Entrepren\u00f8r",   postnr: "4630", farge: "33020", navn: "R\u00f8d",   hex: "#9b2220" },
      { id: "1983-4485", kunde: "Fjordbygg",         postnr: "5003", farge: "33010", navn: "Hvit",  hex: "#f3f3ef" },
      { id: "1983-4484", kunde: "Moe Eiendom",       postnr: "7010", farge: "33021", navn: "Gul",   hex: "#e4c54a" },
    ];

    const sheet = document.getElementById("sheet");
    ORDERS.forEach((o) => {
      const data = [o.id, o.kunde, o.postnr, o.farge].join("|");
      const label = document.createElement("div");
      label.className = "label";
      label.innerHTML =
        '<canvas></canvas>' +
        '<div class="meta">' +
          '<div class="ordre">' + o.id + '</div>' +
          '<div class="row kunde"><div class="lbl">Kunde</div><div class="val">' + o.kunde + '</div></div>' +
          '<div class="row"><div class="lbl">Postnr</div><div class="val">' + o.postnr + '</div></div>' +
          '<div class="row farge"><div class="lbl">Fargekode</div><div class="val"><span class="swatch" style="background:' + o.hex + '"></span>' + o.farge + ' &middot; ' + o.navn + '</div></div>' +
        '</div>';
      sheet.appendChild(label);
      new QRious({ element: label.querySelector("canvas"), value: data, size: 200, level: "M" });
    });
  </script>
</body>
</html>
