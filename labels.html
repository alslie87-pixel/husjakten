<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Malingsetiketter</title>
  <script src="https://cdn.jsdelivr.net/gh/davidshimjs/qrcodejs/qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: ui-sans-serif, system-ui, sans-serif; background: #e9eaec; color: #0f172a; padding: 16px; }

    .toolbar {
      max-width: 210mm; margin: 0 auto 16px; display: flex; align-items: center;
      justify-content: space-between; gap: 12px;
    }
    .toolbar h1 { font-size: 16px; font-weight: 700; }
    .toolbar p { font-size: 12px; color: #64748b; }
    .print-btn {
      background: #0f172a; color: #fff; border: 0; border-radius: 8px;
      padding: 9px 16px; font-size: 14px; font-weight: 600; cursor: pointer;
    }
    .print-btn:hover { background: #1e293b; }

    .sheet {
      width: 210mm; min-height: 297mm; margin: 0 auto; background: #fff; padding: 12mm 10mm;
      box-shadow: 0 4px 20px rgba(0,0,0,.18);
      display: grid; grid-template-columns: 1fr 1fr; grid-auto-rows: 63mm; gap: 6mm;
    }

    .label {
      border: 1px dashed #cbd5e1; border-radius: 6px; padding: 6mm;
      display: flex; align-items: center; gap: 6mm; overflow: hidden;
    }
    .label .qr { width: 38mm; height: 38mm; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .label .qr canvas, .label .qr img { width: 38mm !important; height: 38mm !important; }

    .meta { flex: 1; min-width: 0; }
    .meta .brand {
      font-size: 9px; letter-spacing: 2px; font-weight: 700; color: #f59e0b;
      text-transform: uppercase; margin-bottom: 4px;
    }
    .meta .ordre { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 18px; font-weight: 700; }
    .meta .kunde { font-size: 13px; font-weight: 600; margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .row { display: flex; gap: 10px; margin-top: 8px; }
    .field .k { font-size: 8px; letter-spacing: 1px; text-transform: uppercase; color: #94a3b8; }
    .field .v { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 14px; font-weight: 700; }

    @media print {
      body { background: #fff; padding: 0; }
      .toolbar { display: none; }
      .sheet { box-shadow: none; margin: 0; }
      .label { border-color: #e2e8f0; }
      @page { size: A4; margin: 0; }
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <div>
      <h1>Malingsetiketter — 8 stk per ark</h1>
      <p>Ordrenr · kunde · postnr · fargekode kodet i QR. Klikk «Skriv ut» og fest på spannet.</p>
    </div>
    <button class="print-btn" onclick="window.print()">Skriv ut</button>
  </div>

  <div class="sheet" id="sheet"></div>

  <script>
    var ORDERS = [
      { ordre: "1983-0042", kunde: "Hansen Bygg",       postnr: "0150", farge: "33045" },
      { ordre: "1983-0043", kunde: "Byggmester Nilsen", postnr: "1430", farge: "33910" },
      { ordre: "1983-0044", kunde: "Oslo Eiendom",      postnr: "0560", farge: "33012" },
      { ordre: "1983-0045", kunde: "Vestby Sameie",     postnr: "1540", farge: "33701" },
      { ordre: "1983-0046", kunde: "Lien & Sønn",       postnr: "2010", farge: "33045" },
      { ordre: "1983-0047", kunde: "Sør Entreprenør",   postnr: "4630", farge: "33256" },
      { ordre: "1983-0048", kunde: "Fjordbygg",         postnr: "5003", farge: "33910" },
      { ordre: "1983-0049", kunde: "Moe Eiendom",       postnr: "7010", farge: "33188" },
    ];

    var sheet = document.getElementById("sheet");

    ORDERS.forEach(function (o) {
      var label = document.createElement("div");
      label.className = "label";

      var qr = document.createElement("div");
      qr.className = "qr";

      var meta = document.createElement("div");
      meta.className = "meta";
      meta.innerHTML =
        '<div class="brand">Malingssporing</div>' +
        '<div class="ordre">' + o.ordre + '</div>' +
        '<div class="kunde">' + o.kunde + '</div>' +
        '<div class="row">' +
          '<div class="field"><div class="k">Postnr</div><div class="v">' + o.postnr + '</div></div>' +
          '<div class="field"><div class="k">Fargekode</div><div class="v">' + o.farge + '</div></div>' +
        '</div>';

      label.appendChild(qr);
      label.appendChild(meta);
      sheet.appendChild(label);

      var payload =
        "Ordre: " + o.ordre + "\n" +
        "Kunde: " + o.kunde + "\n" +
        "Postnr: " + o.postnr + "\n" +
        "Fargekode: " + o.farge;

      new QRCode(qr, {
        text: payload,
        width: 200,
        height: 200,
        colorDark: "#000000",
        colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.M,
      });
    });
  </script>
</body>
</html>
